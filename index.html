<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>app name</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
        <div class="cover"></div>
        <div id="title" class="songTitle">Song Name</div>
        
        <div class="progress-container">
            <input type="range" id="progress" class="star-slider" min="0" max="100" value="30">
        </div>

        <div class="controls">
            <button class="btn" id="prev">⏮</button>
            <button class="btn" id="play" style="font-size: 1.6rem;">⏸</button>
            <button class="btn" id="next">⏭</button>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
