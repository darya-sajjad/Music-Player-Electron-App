<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>app name</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
        <div class="cover"></div>
        
        <div id="title" class="songTitle"></div>
        
        <div class="progress-container">
            <input type="range" id="progress" class="star-slider" min="0" max="100" value="30">
        </div>

        <div class="controls">
          <button class="btn" id="prev">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="btn" id="play">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
          </button>
          <button class="btn" id="next">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
          </button>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
